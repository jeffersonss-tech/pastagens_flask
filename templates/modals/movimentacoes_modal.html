<div class="modal" id="modal-movimentacoes">
    <div class="modal-content" style="max-width: 1000px; width: calc(100vw - 20px); box-sizing: border-box; margin: 10px; max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> Histórico de Movimentações</h3>
            <button class="modal-close" onclick="fecharModal('modal-movimentacoes')">×</button>
        </div>
        <div class="modal-body">
            <style>
                .mov-modal-filters { display:flex; flex-direction:column; gap:8px; margin:10px 0 12px; }
                .mov-modal-filters .row { display:flex; flex-wrap:wrap; gap:8px; }
                .mov-modal-input { position:relative; min-width:170px; flex:1; }
                .mov-modal-input i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#888; }
                .mov-modal-input select { width:100%; padding:8px 10px 8px 30px; border:1px solid #ddd; border-radius:8px; background:#fff; }
                .mov-modal-chip-group { display:flex; flex-wrap:wrap; gap:6px; }
                .mov-modal-chip { padding:6px 10px; border:1px solid #ddd; border-radius:16px; cursor:pointer; background:#f7f7f7; font-size:0.85rem; }
                .mov-modal-chip.active { background:#198754; color:#fff; border-color:#198754; }
                .mov-modal-chip.secondary.active { background:#0d6efd; border-color:#0d6efd; }
                .mov-modal-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
                .mov-modal-actions select { padding:8px 10px; border:1px solid #ddd; border-radius:8px; }
                .mov-modal-actions button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; }
                .mov-modal-btn-order { background:#0d6efd; color:#fff; }
                .mov-modal-btn-clear { background:#f1f1f1; }
            </style>

            <div class="mov-modal-filters">
                <div class="row">
                    <div class="mov-modal-input"><i class="fa-solid fa-tag"></i><select id="mov-modal-filtro-lote"></select></div>
                    <div class="mov-modal-input"><i class="fa-solid fa-location-dot"></i><select id="mov-modal-filtro-origem"></select></div>
                    <div class="mov-modal-input"><i class="fa-solid fa-location-arrow"></i><select id="mov-modal-filtro-destino"></select></div>
                    <div class="mov-modal-input"><i class="fa-solid fa-user"></i><select id="mov-modal-filtro-usuario"></select></div>
                    <div class="mov-modal-input"><i class="fa-solid fa-comment"></i><select id="mov-modal-filtro-motivo"></select></div>
                </div>

                <div class="row" style="justify-content:space-between;">
                    <div class="mov-modal-chip-group" id="mov-modal-chips-tipo">
                        <span class="mov-modal-chip secondary active" data-value="">Todos</span>
                        <span class="mov-modal-chip secondary" data-value="movimentacao">Movimentação</span>
                        <span class="mov-modal-chip secondary" data-value="saida">Saída</span>
                    </div>
                    <div class="mov-modal-chip-group" id="mov-modal-chips-periodo">
                        <span class="mov-modal-chip active" data-value="">Tudo</span>
                        <span class="mov-modal-chip" data-value="1">Hoje</span>
                        <span class="mov-modal-chip" data-value="7">7 dias</span>
                        <span class="mov-modal-chip" data-value="30">30 dias</span>
                    </div>
                </div>

                <div class="row mov-modal-actions">
                    <select id="mov-modal-ordenar-por">
                        <option value="data_movimentacao">Data</option>
                        <option value="lote_nome">Lote</option>
                        <option value="origem_nome">Origem</option>
                        <option value="destino_nome">Destino</option>
                        <option value="usuario_nome">Usuário</option>
                        <option value="tipo">Tipo</option>
                        <option value="motivo">Motivo</option>
                    </select>
                    <button id="mov-modal-ordenar-btn" class="mov-modal-btn-order">Ordenar: Desc</button>
                    <button id="mov-modal-limpar" class="mov-modal-btn-clear">Limpar filtros</button>
                </div>
            </div>

            <div style="max-height:420px; overflow:auto; border:1px solid #eee; border-radius:8px;">
                <table class="data-table" style="min-width:900px;">
                    <thead>
                        <tr><th>Lote</th><th>De</th><th>Para</th><th>Data</th><th>Usuário</th><th>Motivo</th></tr>
                    </thead>
                    <tbody id="mov-modal-tabela"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
